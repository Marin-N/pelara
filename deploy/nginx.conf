# HTTP → HTTPS redirect
server {
    listen 80;
    server_name 204.168.139.204 pelara.ai www.pelara.ai;
    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl;
    server_name 204.168.139.204 pelara.ai www.pelara.ai;

    ssl_certificate     /etc/nginx/ssl/pelara.crt;
    ssl_certificate_key /etc/nginx/ssl/pelara.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve React frontend static build
    root /var/www/pelara/frontend/dist;
    index index.html;

    # API requests — proxy to Node.js on port 3001
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Twilio webhook — public
    location /api/calls/webhook {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all non-file routes to React's index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
